<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanflow - 局域网流量监控</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
    <header>
        <h1>Lanflow</h1>
        <p class="subtitle">局域网流量监控</p>
    </header>
    <nav>
        <button class="tab active" data-tab="realtime">实时监控</button>
        <button class="tab" data-tab="history">历史统计</button>
        <button class="tab" data-tab="devices">设备管理</button>
    </nav>
    <main>
        <div id="realtime" class="tab-content active"></div>
        <div id="history" class="tab-content"></div>
        <div id="devices" class="tab-content"></div>
    </main>
    <script src="/js/app.js"></script>
    <script src="/js/realtime.js"></script>
    <script src="/js/history.js"></script>
    <script src="/js/devices.js"></script>
</body>
</html>
